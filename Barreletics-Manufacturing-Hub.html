<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Barreletics Manufacturing Hub</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232733;--border:#2e3344;--text:#e8eaef;--muted:#9aa3b5;--accent:#6c9eff;--success:#4ade80;--warning:#fbbf24;--danger:#f87171;--info:#67e8f9;--purple:#a78bfa;--turquoise:#2dd4bf;--radius:10px;--sans:"DM Sans",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
*,*::before,*::after{box-sizing:border-box}
html{font-size:16px;scroll-behavior:smooth}
body{margin:0;font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:underline;text-underline-offset:2px}
a:hover{color:#93c5fd}
.wrap{max-width:1200px;margin:0 auto;padding:16px 20px 48px}
header{margin-bottom:20px}
h1{font-size:clamp(1.5rem,4vw,2rem);font-weight:700;margin:0 0 8px;letter-spacing:-.02em}
h2{font-size:1.35rem;font-weight:600;margin:28px 0 12px}
h3{font-size:1.05rem;font-weight:600;margin:20px 0 10px;color:var(--text)}
.sub{color:var(--muted);font-size:.95rem;margin:0 0 16px}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-bottom:16px}
.control-label{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:8px}
.pill{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:8px 14px;border-radius:999px;font-size:.85rem;cursor:pointer;font-family:inherit;transition:all .15s}
.pill:hover{border-color:var(--accent)}
.pill.active{background:var(--accent);border-color:var(--accent);color:#0f1117;font-weight:600}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:12px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.stat-val{font-size:1.5rem;font-weight:700;line-height:1.2}
.stat-val.danger{color:var(--danger)}
.stat-val.success{color:var(--success)}
.stat-label{font-size:.75rem;color:var(--muted);margin-top:4px}
.tabs{display:flex;flex-wrap:wrap;gap:8px;margin:20px 0;padding-bottom:12px;border-bottom:1px solid var(--border)}
.tab-btn{border:1px solid var(--border);background:var(--surface);color:var(--text);padding:10px 16px;border-radius:var(--radius);font-size:.9rem;cursor:pointer;font-family:inherit;font-weight:500}
.tab-btn.active{background:var(--surface2);border-color:var(--accent);color:var(--accent)}
.tab-panel{display:none}
.tab-panel.active{display:block}
.callout{border-radius:var(--radius);padding:14px 16px;margin:16px 0;border-left:4px solid}
.callout.info{background:#1e293b;border-color:var(--info)}
.callout.warning{background:#292524;border-color:var(--warning)}
.callout.success{background:#14532d33;border-color:var(--success)}
.callout.danger{background:#450a0a55;border-color:var(--danger)}
.callout-title{font-weight:600;margin-bottom:6px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin:16px 0}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface2);font-weight:600;font-size:.95rem}
.card-body{padding:14px 16px}
.badge{font-size:.7rem;padding:3px 8px;border-radius:999px;font-weight:600}
.badge.info{background:#0e7490;color:#cffafe}
.badge.success{background:#166534;color:#bbf7d0}
.badge.warning{background:#854d0e;color:#fef08a}
.badge.danger{background:#991b1b;color:#fecaca}
.badge.purple{background:#5b21b6;color:#e9d5ff}
.badge.turquoise{background:#0f766e;color:#ccfbf1}
ul.plain{list-style:none;padding:0;margin:0}
ul.plain li{padding:4px 0;color:var(--muted)}
ul.todos li{padding:6px 0 6px 24px;position:relative;color:var(--text)}
ul.todos li::before{content:"☐";position:absolute;left:0;color:var(--muted)}
table{width:100%;border-collapse:collapse;font-size:.85rem;margin:12px 0}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--surface2);font-weight:600;color:var(--muted);font-size:.75rem;text-transform:uppercase;letter-spacing:.03em;position:sticky;top:0}
tr.row-danger td{background:#450a0a33}
tr.row-warning td{background:#42200633}
tr.row-info td{background:#0c4a6e33}
tr.row-success td{background:#14532d33}
tr:hover td{background:var(--surface2)}
.num{text-align:right;font-variant-numeric:tabular-nums}
.center{text-align:center}
.pantone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin:12px 0}
.pantone-link{display:block;padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-weight:600;color:var(--accent)}
.pantone-link:hover{background:var(--surface2)}
.bar-row{display:flex;align-items:center;gap:10px;margin:6px 0;font-size:.82rem}
.bar-label{min-width:120px;flex-shrink:0;color:var(--muted)}
.bar-track{flex:1;height:18px;background:var(--surface2);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--turquoise));border-radius:4px;min-width:2px}
.bar-val{min-width:36px;text-align:right;font-weight:600}
.split-viz{display:flex;height:28px;border-radius:6px;overflow:hidden;margin:12px 0}
.split-cs{background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#0f1117}
.split-os{background:var(--turquoise);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:600;color:#0f1117}
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border:1px solid var(--border);border-radius:var(--radius)}
.hex-swatch{display:inline-block;width:14px;height:14px;border-radius:3px;vertical-align:middle;margin-right:6px;border:1px solid var(--border)}
@media(max-width:640px){.wrap{padding:12px}.pill,.tab-btn{font-size:.8rem;padding:8px 12px}th,td{padding:8px;font-size:.78rem}}
</style>
</head>

function renderJuly2026SamplesHtml() {
  const groups = JULY_2026_SAMPLES.map(g =>

let budget = 450;
let mode = "moderate";
let sortBy = "weeks";

function pantoneUrl(p) {
  const m = p.match(/^(\d{2}-\d{4})\s*TCX$/i);
  return m ? PANTONE + "/" + m[1] + "-TCX" : null;
}

function isExcluded(s) {
  if (s.color === "White" || s.color === "DarkGrey") return true;
  if (s.color === "Coral" && s.style === "Closed Sole") return true;
  if (s.color === "Bright Yellow" && s.style === "Open Sole") return true;
  if (s.color === "Blue") return true;
  if (s.color === "Black" && s.style === "Open Sole") return true;
  if (s.color === "LightGrey" && s.style === "Open Sole") return true;
  return false;
}

function roundToMoq(qty, priority) {
  if (qty <= 0) return 0;
  if (qty >= MFG_MOQ_DEFAULT) return qty;
  if (priority === "critical" || priority === "reorder") return MFG_MOQ_DEFAULT;
  if (qty >= MFG_MOQ_EXCEPTION) return MFG_MOQ_EXCEPTION;
  return 0;
}

function getVel(s) {
  if (mode === "conservative") return s.csvVelocity;
  if (mode === "growth") return s.appVelocity;
  let vel = s.csvVelocity * 1.15;
  const isBulk = s.color === "Bright Yellow" && s.csvUnits100d > s.orders * 1.5;
  if (isBulk && mode !== "growth") vel = s.appVelocity > 0 ? s.appVelocity : vel;
  return vel;
}

function buildPlan(skus, bud) {
  const TARGET_WEEKS = 16;
  const items = skus.filter(s => !isExcluded(s)).map(s => {
    let vel = getVel(s);
    if (vel <= 0 && s.liveInventory > 0) return null;
    const currentWks = vel > 0 ? s.liveInventory / vel : 0;
    const gap = Math.max(0, TARGET_WEEKS - currentWks);
    const unitsNeeded = Math.ceil(gap * vel);
    let priority, reason;
    if (s.liveInventory <= 0 && s.csvUnits100d > 5) { priority = "critical"; reason = "Out of stock — losing sales"; }
    else if (currentWks <= 3) { priority = "critical"; reason = "Only " + currentWks.toFixed(0) + " weeks left at current pace"; }
    else if (currentWks <= REORDER_POINT_WEEKS) { priority = "reorder"; reason = "Below reorder point (" + REORDER_POINT_WEEKS.toFixed(0) + " wks for lead + safety)"; }
    else if (currentWks <= 13 && vel >= 1.5) { priority = "watch"; reason = "Moderate stock, decent velocity"; }
    else if (s.style === "Closed Sole" && LIMITED_EDITION_CS.includes(s.color) && s.csvUnits100d >= 19) { priority = "watch"; reason = "Limited edition — " + s.csvUnits100d + " sold in 100 days (do not skip)"; }
    else return null;
    const score = vel * 12 + (priority === "critical" ? 80 : priority === "reorder" ? 50 : 20);
    return Object.assign({}, s, { pairsToMake: 0, unitsNeeded, priority, reason, score, velocityUsed: vel });
  }).filter(Boolean).sort((a,b) => b.score - a.score);

  let remaining = bud;
  const csCap = Math.round(bud * 0.6);
  const osCap = bud - csCap;
  let remainingCS = csCap, remainingOS = osCap;

  for (const item of items) {
    if (remaining <= 0) break;
    const styleRemaining = item.style === "Closed Sole" ? remainingCS : remainingOS;
    if (styleRemaining <= 0) continue;
    const rawQty = Math.min(item.unitsNeeded > 0 ? item.unitsNeeded : 15, 120, remaining, styleRemaining);
    const qty = roundToMoq(rawQty, item.priority);
    if (qty <= 0) continue;
    item.pairsToMake = qty;
    remaining -= qty;
    if (item.style === "Closed Sole") remainingCS -= qty; else remainingOS -= qty;
  }
  if (remaining > 0) {
    for (const item of items) {
      if (remaining <= 0) break;
      const styleRemaining = item.style === "Closed Sole" ? remainingCS : remainingOS;
      if (styleRemaining <= 0) continue;
      if (item.priority === "critical" || item.priority === "reorder") {
        const extra = Math.min(50, remaining, styleRemaining);
        item.pairsToMake += extra;
        remaining -= extra;
        if (item.style === "Closed Sole") remainingCS -= extra; else remainingOS -= extra;
      }
    }
  }
  return items.filter(i => i.pairsToMake > 0);
}

  const inRows = [{"sku":"OS-LG-Coral","style":"Open Sole","color":"Coral","pairs":55,"reason":"Critical — 1 unit, 1.1 wks at moderate velocity (MOQ 50+)"},{"sku":"OS-MED-Coral","style":"Open Sole","color":"Coral","pairs":50,"reason":"Support OS Coral anchor — rounded to MOQ 50"},{"sku":"CS-MED-DR","style":"Closed Sole","color":"Dusty Rose","pairs":50,"reason":"Critical — 16 units; rounded to MOQ 50"},{"sku":"CS-LG-DR","style":"Closed Sole","color":"Dusty Rose","pairs":50,"reason":"Reorder — 29 units; rounded to MOQ 50"},{"sku":"CS-LG-LGY","style":"Closed Sole","color":"Light Grey","pairs":50,"reason":"Critical — OOS (0 units); MOQ 50; pending Few People sell-through gate"},{"sku":"CS-MED-Black","style":"Closed Sole","color":"Black","pairs":50,"reason":"Core mover — rounded to MOQ 50"},{"sku":"CS-LG-Black","style":"Closed Sole","color":"Black","pairs":50,"reason":"Core mover — top CS SKU; MOQ 50"},{"sku":"CS-MED-Y","style":"Closed Sole","color":"Bright Yellow","pairs":50,"reason":"Confirmed keep — viral CS pop; MOQ 50"},{"sku":"CS-LG-Y","style":"Closed Sole","color":"Bright Yellow","pairs":50,"reason":"Modest LG demand; rounded to MOQ 50"},{"sku":"OS-MED-Black","style":"Open Sole","color":"Black","pairs":50,"reason":"OS allocation — rounded to MOQ 50"},{"sku":"OS-LG-Black","style":"Open Sole","color":"Black","pairs":50,"reason":"Minimal run — MOQ 50; deprioritized vs Coral"},{"sku":"CS-MED-PUR","style":"Closed Sole","color":"Purple","pairs":50,"reason":"Limited rotation — MOQ 50"},{"sku":"CS-LG-PUR","style":"Closed Sole","color":"Purple","pairs":50,"reason":"Limited rotation — MOQ 50"},{"sku":"CS-MED-TQ","style":"Closed Sole","color":"Turquoise","pairs":50,"reason":"Limited rotation — MOQ 50"},{"sku":"CS-LG-TQ","style":"Closed Sole","color":"Turquoise","pairs":50,"reason":"Limited rotation — MOQ 50"},{"sku":"OS-MED-RG","style":"Open Sole","color":"Rivian Green","pairs":50,"reason":"Limited OS rotation — MOQ 50"}].map(r => {
    const cls = r.reason.startsWith("Critical") ? "row-danger" : r.reason.includes("Limited") ? "row-info" : "";
    return '<tr class="' + cls + '"><td>' + esc(r.sku) + '</td><td>' + esc(r.style) + '</td><td>' + esc(r.color) + '</td><td class="num">' + r.pairs + '</td><td>' + esc(r.reason) + '</td></tr>';
  }).join("");
  const outRows = [{"color":"White","styles":"Both","reason":"Discontinued both styles"},{"color":"Coral","styles":"Closed Sole","reason":"CS Coral stopped — OS Coral only"},{"color":"Bright Yellow","styles":"Open Sole","reason":"OS Yellow sell-through only — 117 units on hand (OS-LG-Y 104); no manufacturing"},{"color":"Blue","styles":"Closed Sole","reason":"CS Blue likely not running"},{"color":"Blue","styles":"Open Sole","reason":"Physical inventory exceeds Shopify — no manufacturing priority"},{"color":"Black","styles":"Open Sole","reason":"Physical inventory exceeds Shopify — deprioritize OS Black runs"},{"color":"Dark Grey","styles":"Both","reason":"Run down existing stock; replacing with newer neutrals"},{"color":"Light Grey","styles":"Open Sole","reason":"Run down — nude family replaces grey on CS first"},{"color":"Electric (new)","styles":"Closed Sole","reason":"Strategic: electric belongs on OS alongside Coral; CS keeps Yellow"}].map(r => '<tr class="row-danger"><td>' + esc(r.color) + '</td><td>' + esc(r.styles) + '</td><td>' + esc(r.reason) + '</td></tr>').join("");
  const roadmap = [{"days":"Days 0–30","title":"Stabilize core and stop bleeders","actions":["Run 450-pair batch: prioritize OS-LG-Coral (1 unit), CS-MED-DR, CS-LG-LGY critical SKUs","Stop all White, CS Coral manufacturing; stop OS Yellow manufacturing (sell through 117 OS units)","Run down Dark Grey on both styles — no new DGY production","Hold OS Blue and OS Black — physical inventory ahead of Shopify counts","Audit Few People CS Light Grey sell-through before any LGY reorder"]},{"days":"Days 31–60","title":"Nude neutral rollout","actions":["Introduce tan nude on CS (Light Grey replacement candidate)","Add rust / earthy orange as second nude-family color","Phase CS Yellow as confirmed keep — CS-MED-Y reorder; no OS Yellow runs","Keep OS Coral as primary OS pop; add electric as second OS pop (not replacing Coral)","Limited-edition rotation: Purple, Turquoise, Dusty Rose, Deep Teal, Rivian Green as demand warrants"]},{"days":"Days 61–90","title":"Electric bright on Open Sole","actions":["Launch new electric pop on Open Sole alongside Coral (Coral stays anchor)","CS Yellow remains Active — viral/social spike driver on Closed Sole only","Do not reorder OS Yellow — sell through OS-LG-Y 104 overstock via promos/social","Confirm OS palette = Black + Coral + electric pop + neutrals (nude replaces grey family)","Revisit CS Blue — remain discontinued unless retailer pull changes","Next manufacturing run: 60/40 CS/OS split, moderate +15% velocity model"]}].map(p => '<div class="card"><div class="card-head">' + esc(p.title) + ' <span class="badge info">' + esc(p.days) + '</span></div><div class="card-body"><ul class="plain">' + p.actions.map((a,i) => '<li>' + (i+1) + '. ' + esc(a) + '</li>').join("") + '</ul></div></div>').join("");

  document.getElementById("tab-strategy").innerHTML = `
<h2>Color Strategy</h2>
<p class="sub">Status key: Active = ongoing production | Run down = sell through | New = upcoming | Limited = rotation batch | Channel-only = retailer gate | Discontinued = do not reorder</p>
<div class="table-wrap"><table><thead><tr><th>Color</th><th>Closed Sole</th><th>Open Sole</th><th>Notes</th></tr></thead><tbody>${matrixRows}</tbody></table></div>
<div class="callout warning"><div class="callout-title">Manufacturing MOQ: 50 pairs per SKU</div>Full IN list at MOQ 50 = 805 pairs — exceeds 450 budget; rebalance priorities or increase batch size.</div>
<h3>IN — produce this run</h3>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Style</th><th>Color</th><th class="num">Pairs</th><th>Rationale</th></tr></thead><tbody>${inRows}</tbody></table></div>
<h3>OUT — do not produce</h3>
<div class="table-wrap"><table><thead><tr><th>Color</th><th>Style scope</th><th>Reason</th></tr></thead><tbody>${outRows}</tbody></table></div>

<div class="card-grid">${roadmap}</div>
<h3>Open decisions</h3>
<ul class="todos">${["CS Light Grey: pull Few People retailer sell-through data before reordering CS-LG-LGY","Confirm tan nude replaces CS Light Grey (not a second grey shade)","Select electric hue for Open Sole (second pop alongside Coral)","Plan OS Yellow sell-through: social/BOGO on OS-LG-Y without reordering manufacturing","Validate OS Blue and OS Black physical vs Shopify inventory delta","Schedule next limited-edition rotation (Purple, Turquoise, DR, Deep Teal, Rivian Green)"].map(t => '<li>' + esc(t) + '</li>').join("")}</ul>`;
}

function renderInventory() {
  const sorted = [...SKUS].sort((a,b) => {
    const velA = getVel(a), velB = getVel(b);
    if (sortBy === "velocity") return velB - velA;
    if (sortBy === "stock") return a.liveInventory - b.liveInventory;
    const wA = velA > 0 ? a.liveInventory / velA : 9999;
    const wB = velB > 0 ? b.liveInventory / velB : 9999;
    return wA - wB;
  });
  const yellowRows = [{"sku":"CS-MED-Y","style":"Closed Sole","size":"M","units":29,"appVel":2.64,"weeks":11.4,"flag":"Bulk inflated (CSV 2× orders)"},{"sku":"CS-LG-Y","style":"Closed Sole","size":"L","units":31,"appVel":1,"weeks":34,"flag":"Clean velocity"},{"sku":"OS-MED-Y","style":"Open Sole","size":"M","units":13,"appVel":0.91,"weeks":16.5,"flag":"Bulk inflated (CSV 2.9× orders)"},{"sku":"OS-LG-Y","style":"Open Sole","size":"L","units":104,"appVel":1.73,"weeks":61.3,"flag":"Bulk inflated; 151 wks at MCP vel"}].map(r => {
    const cls = r.sku === "OS-LG-Y" ? "row-danger" : "";
    return '<tr class="' + cls + '"><td>' + esc(r.sku) + '</td><td>' + esc(r.style) + '</td><td class="center">' + r.size + '</td><td class="num">' + r.units + '</td><td class="num">' + r.appVel.toFixed(2) + '</td><td class="num">' + r.weeks.toFixed(1) + '</td><td>' + esc(r.flag) + '</td></tr>';
  }).join("");
  const invRows = sorted.map(s => {
    const vel = getVel(s);
    const weeks = vel > 0 ? (s.liveInventory / vel).toFixed(0) : "--";
    let cls = "";
    if (vel > 0) { const w = s.liveInventory / vel; if (w <= 3) cls = "row-danger"; else if (w <= 9) cls = "row-warning"; else if (w <= 13) cls = "row-info"; }
    return '<tr class="' + cls + '"><td>' + esc(s.sku) + '</td><td class="center">' + (s.style === "Closed Sole" ? "CS" : "OS") + '</td><td class="center">' + s.size + '</td><td>' + esc(s.color) + '</td><td class="num">' + (vel > 0 ? vel.toFixed(2) : "--") + '</td><td class="num">' + (s.mcpVelocity > 0 ? s.mcpVelocity.toFixed(2) : "--") + '</td><td class="num">' + Math.max(0,s.liveInventory) + '</td><td class="num">' + weeks + '</td><td class="num">' + (s.delta2d < 0 ? s.delta2d : "--") + '</td><td class="num">' + s.csvUnits100d + '</td></tr>';
  }).join("");

  document.getElementById("tab-inventory").innerHTML = `
<div class="callout info"><div class="callout-title">1,797 stock scope</div>Total 1,797 pairs = Shopify stock for 36 forecast SKUs only (CS 891 + OS 906, M and L grippy shoes). Not a full warehouse audit.</div>
<h3>Yellow inventory snapshot</h3>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Style</th><th>Size</th><th class="num">Units</th><th class="num">App vel/wk</th><th class="num">Weeks</th><th>Flag</th></tr></thead><tbody>${yellowRows}</tbody></table></div>
<p class="sub">Total Yellow on hand: 177 pairs (CS 60 · OS 117)</p>
<h2>Inventory and Velocity (Live Jul 8, 2026)</h2>
<div class="pills" id="sort-pills" style="margin-bottom:12px">
<button class="pill ${sortBy==="weeks"?"active":""}" data-sort="weeks">Fewest weeks</button>
<button class="pill ${sortBy==="velocity"?"active":""}" data-sort="velocity">Fastest selling</button>
<button class="pill ${sortBy==="stock"?"active":""}" data-sort="stock">Lowest stock</button>
</div>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Style</th><th>Size</th><th>Color</th><th class="num">Vel/wk</th><th class="num">MCP/wk</th><th class="num">Stock</th><th class="num">Wks</th><th class="num">2d Δ</th><th class="num">100d</th></tr></thead><tbody>${invRows}</tbody></table></div>`;

  document.getElementById("sort-pills").addEventListener("click", e => {
    const btn = e.target.closest("[data-sort]");
    if (!btn) return;
    sortBy = btn.dataset.sort;
    renderInventory();
  });
}

function renderAudit() {
  const comparisons = SKUS.filter(s => s.csvVelocity > 0 && s.appVelocity > 0).map(s => {
    const ratio = s.appVelocity / s.csvVelocity;
    const isBulk = s.color === "Bright Yellow" && s.csvUnits100d > s.orders * 1.5;
    return Object.assign({}, s, { ratio, diffPct: (ratio-1)*100, isBulk });
  });
  const normal = comparisons.filter(c => !c.isBulk);
  const bulk = comparisons.filter(c => c.isBulk);
  const avgRatio = normal.reduce((s,c) => s + c.ratio, 0) / normal.length;
  const matchCount = normal.filter(c => Math.abs(c.diffPct) <= 35).length;

  const crossRows = SKUS.filter(s => s.csvVelocity > 0.3).sort((a,b) => b.csvVelocity - a.csvVelocity).map(s => {
    const ratio = s.mcpVelocity / s.csvVelocity;
    let verdict = "Validated";
    if (s.color === "Bright Yellow" && s.csvUnits100d > s.orders * 1.5) verdict = "Bulk inflated";
    else if (ratio < 0.6) verdict = "Below expected";
    else if (ratio > 1.3) verdict = "Trending up";
    let cls = ratio >= 0.7 && ratio <= 1.3 ? "row-success" : "row-warning";
    if (s.color === "Bright Yellow" && s.csvUnits100d > s.orders * 1.5) cls = "row-danger";
    return '<tr class="' + cls + '"><td>' + esc(s.sku) + '</td><td class="center">' + s.size + '</td><td class="num">' + s.csvVelocity.toFixed(2) + '</td><td class="num">' + s.mcpVelocity.toFixed(2) + '</td><td class="num">' + s.appVelocity.toFixed(2) + '</td><td class="num">' + ratio.toFixed(2) + 'x</td><td>' + verdict + '</td></tr>';
  }).join("");

  const normalRows = normal.sort((a,b) => b.csvVelocity - a.csvVelocity).map(c => {
    const status = c.ratio >= 1.15 && c.ratio <= 1.35 ? "Expected range" : c.ratio < 1.15 ? "Under-projects" : "Over-projects";
    const cls = c.ratio >= 1.15 && c.ratio <= 1.35 ? "row-success" : c.ratio > 1.35 ? "row-warning" : "";
    return '<tr class="' + cls + '"><td>' + esc(c.sku) + '</td><td>' + esc(c.color) + '</td><td class="center">' + c.size + '</td><td class="num">' + c.csvVelocity.toFixed(2) + '</td><td class="num">' + c.appVelocity.toFixed(2) + '</td><td class="num">' + c.ratio.toFixed(2) + 'x</td><td>' + status + '</td></tr>';
  }).join("");

  const bulkRows = bulk.map(c => '<tr class="row-warning"><td>' + esc(c.sku) + '</td><td>' + esc(c.color) + '</td><td class="center">' + c.size + '</td><td class="num">' + c.csvVelocity.toFixed(2) + '</td><td class="num">' + c.appVelocity.toFixed(2) + '</td><td class="num">' + c.csvUnits100d + '</td><td class="num">' + c.orders + '</td><td>Use app (filters bulk)</td></tr>').join("");

  const deltaRows = SKUS.filter(s => s.delta2d < 0).sort((a,b) => a.delta2d - b.delta2d).map(s =>
    '<tr><td>' + esc(s.sku) + '</td><td class="num">' + s.canvasInventory + '</td><td class="num">' + s.liveInventory + '</td><td class="num">' + s.delta2d + '</td><td class="num">' + (Math.abs(s.delta2d)/2*7).toFixed(1) + '</td><td class="num">' + s.csvVelocity.toFixed(1) + '</td></tr>'
  ).join("");

  const topSku = SKUS[0];
  const rawVel = topSku.csvVelocity;

  document.getElementById("tab-audit").innerHTML = `
<h2>App Audit</h2>
<h3>App Accuracy Verdict</h3>
<div class="card"><div class="card-head">BR Inventory Planner: Worth Keeping <span class="badge success">Keep</span></div><div class="card-body">
<div class="stats"><div class="stat"><div class="stat-val">${avgRatio.toFixed(2)}x</div><div class="stat-label">Avg app/CSV ratio (normal SKUs)</div></div>
<div class="stat"><div class="stat-val success">${matchCount}/${normal.length}</div><div class="stat-label">SKUs within 35% of raw</div></div>
<div class="stat"><div class="stat-val success">100%</div><div class="stat-label">Inventory accuracy</div></div></div>
<p><strong>Verdict: The app is systematically biased but predictably useful.</strong></p>
<p class="sub">The +30% growth slider produces an actual ~25% multiplier over raw Shopify data. For most SKUs the inflation is consistent (1.20-1.30x), making it predictable and correctable.</p>
</div></div>
<div class="card" style="margin-top:16px"><div class="card-head">Does Raw Data Support +30% Growth? <span class="badge warning">Not Supported</span></div><div class="card-body">
<p><strong>No.</strong> The raw Shopify data does NOT support a 30% growth assumption.</p>
<p class="sub">A 10-15% growth buffer is prudent for seasonal pickup (summer), but 30% overstates reality and risks overproduction.</p>
<p><strong>Recommendation: Reduce growth slider from +30% to +15%.</strong></p></div></div>
<div class="callout warning"><div class="callout-title">Bright Yellow Anomaly — CONFIRMED by Orders API</div>CS-MED-Y, OS-MED-Y, and OS-LG-Y show 2-3x more units than orders in CSV (bulk purchases). OS-LG-Y: CSV 4.90/wk vs MCP 0.70/wk vs App 1.73/wk.</div>
<h3>Orders API Cross-Validation (564 orders, May 9 - Jul 8)</h3>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Size</th><th class="num">CSV/wk</th><th class="num">MCP/wk</th><th class="num">App/wk</th><th class="num">MCP/CSV</th><th>Verdict</th></tr></thead><tbody>${crossRows}</tbody></table></div>
<h3>Normal SKUs — App vs Raw Shopify</h3>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Color</th><th>Size</th><th class="num">CSV/wk</th><th class="num">App/wk</th><th class="num">Ratio</th><th>Status</th></tr></thead><tbody>${normalRows}</tbody></table></div>
<h3>Bulk Anomaly SKUs — App is MORE Accurate</h3>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th>Color</th><th>Size</th><th class="num">CSV/wk</th><th class="num">App/wk</th><th class="num">Units</th><th class="num">Orders</th><th>Verdict</th></tr></thead><tbody>${bulkRows}</tbody></table></div>
<h3>Live Inventory Validation (MCP Pull Jul 8)</h3>
<div class="table-wrap"><table><thead><tr><th>SKU</th><th class="num">Jun 30</th><th class="num">Jul 2</th><th class="num">Delta</th><th class="num">Implied wk</th><th class="num">CSV wk</th></tr></thead><tbody>${deltaRows}</tbody></table></div>
<h3>App Settings Validation</h3>
<div class="table-wrap"><table><thead><tr><th>Setting</th><th>Current</th><th>Assessment</th><th>Recommendation</th></tr></thead><tbody>
<tr class="row-success"><td>Lead Time</td><td>45 days (6.4 wks)</td><td>Correct — matches 6-week manufacturing cycle + shipping buffer</td><td>Keep at 45 days</td></tr>
<tr class="row-success"><td>Safety Stock</td><td>21 days (3 wks)</td><td>Correct — covers ~3 weeks of demand variance during lead time</td><td>Keep at 21 days</td></tr>
<tr class="row-success"><td>Overstock Threshold</td><td>120 days</td><td>Correct — prevents >4 months dead stock for slow movers</td><td>Keep at 120 days</td></tr>
<tr class="row-warning"><td>Historical Data Period</td><td>120 days</td><td>Slightly long — older data dilutes recent trends</td><td>Reduce to 100 days</td></tr>
<tr class="row-success"><td>Min Order Qty</td><td>50 pairs (default)</td><td>Matches manufacturing MOQ</td><td>Set app to 50</td></tr>
<tr class="row-danger"><td>Growth Slider</td><td>+30%</td><td>Too aggressive — actual data supports ~10-15% growth</td><td>Reduce to +15%</td></tr>
</tbody></table></div>
<div class="callout info"><div class="callout-title">Optimal Change Summary</div>Only 2 settings need adjustment: reduce Historical Data Period from 120 to 100 days, and reduce Growth Slider from +30% to +15%. All other settings are well-calibrated.</div>
<div class="card"><div class="card-head">Why 45-Day Lead Time + 21-Day Safety Works</div><div class="card-body">
<p>For top SKU (CS-MED-Black at ${rawVel.toFixed(1)} units/wk):</p>
<p>Lead time demand: ${(rawVel*45/7).toFixed(0)} pairs · Safety stock: ${(rawVel*21/7).toFixed(0)} pairs · Reorder point: ${(rawVel*45/7+rawVel*21/7).toFixed(0)} pairs</p>
<p class="sub">Current stock of ${topSku.liveInventory} gives ${(topSku.liveInventory/rawVel).toFixed(1)} weeks of runway.</p></div></div>`;
}

document.getElementById("budget-pills").addEventListener("click", e => {
  const btn = e.target.closest("[data-budget]");
  if (!btn) return;
  budget = +btn.dataset.budget;
  document.querySelectorAll("#budget-pills .pill").forEach(p => p.classList.toggle("active", p === btn));
  render();
});
document.getElementById("mode-pills").addEventListener("click", e => {
  const btn = e.target.closest("[data-mode]");
  if (!btn) return;
  mode = btn.dataset.mode;
  document.querySelectorAll("#mode-pills .pill").forEach(p => p.classList.toggle("active", p === btn));
  render();
});
document.getElementById("tab-nav").addEventListener("click", e => {
  const btn = e.target.closest("[data-tab]");
  if (!btn) return;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.toggle("active", b === btn));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id === "tab-" + btn.dataset.tab));
});

render();
</script>
